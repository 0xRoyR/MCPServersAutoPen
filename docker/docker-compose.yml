# AutoPen MySQL Database
#
# Run this on the Ubuntu machine (same host as MCP server):
#   cd docker && docker compose up -d
#
# Connection details:
#   Host (from Ubuntu/MCP server) : localhost:3306
#   Host (from Windows/backend)   : 192.168.68.132:3306
#   Database : autopen
#   User     : autopen
#   Password : autopen_secret   ← change before production!
#
# To reset all data:
#   docker compose down -v && docker compose up -d

services:
  mysql:
    image: mysql:8.0
    container_name: autopen_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: autopen_root_secret
      MYSQL_DATABASE: autopen
      MYSQL_USER: autopen
      MYSQL_PASSWORD: autopen_secret
    ports:
      - "3306:3306"
    volumes:
      - autopen_mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "autopen", "-pautopen_secret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  autopen_mysql_data:
    driver: local
